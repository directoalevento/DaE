backend:
  name: git-gateway
  branch: main

media_folder: "public/assets"
public_folder: "/assets"

collections:
  - name: "servicios"
    label: "Servicios"
    folder: "src/content/servicios"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nombre del Servicio", name: "title", widget: "string"}
      - {label: "Categoría", name: "category", widget: widget: "string"}
      - {label: "Imagen Portada", name: "image", widget: "image"}
      - {label: "Descripción Corta", name: "description", widget: "text"}
      - {label: "Enlace Vídeo (YouTube/Vimeo)", name: "video_url", widget: "string", required: false}
      - {label: "Catálogo PDF", name: "pdf", widget: "file", required: false}
      - {label: "Cuerpo del Servicio", name: "body", widget: "markdown"}